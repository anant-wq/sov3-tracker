<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO V3 — XpertPack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .header { background: #1a73e8; color: white; padding: 16px 24px; }
        .header h1 { font-size: 20px; font-weight: 500; }
        .container { max-width: 1400px; margin: 24px auto; padding: 0 24px; }
        .status { padding: 12px; background: #e8f5e9; border-radius: 8px; margin-bottom: 16px; text-align: center; }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header"><h1>Sales Order V3 — Shortfall Tracker</h1></div>
    <div class="container">
        <div class="status">API is running. You will build the frontend here.</div>
        <p>Endpoints:</p>
        <ul>
            <li><a href="/api/customers">/api/customers</a> — list all customers</li>
            <li>/api/customer/{name} — get tracker data for one customer</li>
            <li><a href="/api/shortfalls">/api/shortfalls</a> — full BPRO/PO shortfall scan (takes ~2 min)</li>
        </ul>
    </div>
</body>
</html>
